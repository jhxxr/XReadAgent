# Release workflow — triggered by semver tag push.
# Builds platform installers and uploads to GitHub Releases.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build Windows installer ─────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: electron/pnpm-lock.yaml

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install electron dependencies
        run: cd electron && pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: uv sync --frozen

      - name: Bundle Python
        run: cd electron && pnpm pack:python

      - name: Build installer
        run: cd electron && pnpm dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: electron/release/*.exe
          if-no-files-found: error

  # ── Build macOS installer ───────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    # Temporarily disabled: electron-builder `universal` mac target is incompatible
    # with the single-arch (arm64) bundled Python — @electron/universal fails with a
    # mach-o file-count mismatch. Re-enable after switching mac to arm64-only or
    # bundling both arches. Tracked separately.
    if: false
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: electron/pnpm-lock.yaml

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install electron dependencies
        run: cd electron && pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: uv sync --frozen

      - name: Bundle Python
        run: cd electron && pnpm pack:python

      - name: Build installer (unsigned)
        run: cd electron && pnpm dist:mac
        env:
          # Skip code signing — build unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-installer
          path: |
            electron/release/*.dmg
            electron/release/*.zip
          if-no-files-found: error

  # ── Create GitHub Release ───────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows]
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*
