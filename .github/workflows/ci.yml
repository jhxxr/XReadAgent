# SPDX-License-Identifier: AGPL-3.0-or-later
# CI workflow — runs on every push and pull request.
# Validates lint, typecheck, and tests for all three packages.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend (Python) ────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check backend/src backend/tests

      - name: Typecheck (mypy)
        run: uv run mypy backend/src

      - name: Tests
        run: uv run pytest -xvs backend/tests

  # ── Frontend (React/Vite) ───────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # ── Electron ────────────────────────────────────────────────────────
  electron:
    name: Electron
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: electron/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # ── E2E (sidecar lifecycle) ─────────────────────────────────────────
  e2e:
    name: E2E (sidecar lifecycle)
    runs-on: ubuntu-latest
    # Only gates on the layers it actually exercises (Python sidecar spawned
    # from the electron test harness). The frontend job is independent.
    needs: [backend, electron]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: electron/pnpm-lock.yaml

      - name: Install backend dependencies
        run: uv sync --frozen

      - name: Install electron dependencies
        run: cd electron && pnpm install --frozen-lockfile

      - name: Run E2E sidecar lifecycle test
        run: cd electron && pnpm test -- --run tests/e2e/sidecar-lifecycle.test.ts
        env:
          XREADAGENT_E2E: "1"
