<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- XReadAgent placeholder icon: a stylized open book/reader -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)" />
  <!-- Book left page -->
  <path d="M128 56 L128 200 Q80 190 56 184 L56 70 Q80 64 128 56 Z" fill="url(#accent)" opacity="0.9" />
  <!-- Book right page -->
  <path d="M128 56 L128 200 Q176 190 200 184 L200 70 Q176 64 128 56 Z" fill="#60a5fa" opacity="0.7" />
  <!-- Center spine -->
  <line x1="128" y1="56" x2="128" y2="200" stroke="#1e3a5f" stroke-width="3" />
  <!-- Reading lines on left page -->
  <line x1="72" y1="90" x2="118" y2="82" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" opacity="0.5" />
  <line x1="72" y1="110" x2="118" y2="102" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" opacity="0.5" />
  <line x1="72" y1="130" x2="118" y2="122" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" opacity="0.5" />
  <line x1="72" y1="150" x2="100" y2="144" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" opacity="0.5" />
  <!-- Reading lines on right page -->
  <line x1="138" y1="82" x2="184" y2="90" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  <line x1="138" y1="102" x2="184" y2="110" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  <line x1="138" y1="122" x2="184" y2="130" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  <line x1="156" y1="144" x2="184" y2="150" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" opacity="0.4" />
</svg>