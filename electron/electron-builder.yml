# SPDX-License-Identifier: AGPL-3.0-or-later
#
# electron-builder configuration for XReadAgent desktop packaging.
#
# Build: `pnpm pack` (directory-only, for testing) or `pnpm dist` (NSIS installer).
# Python bundling is separate: run `pnpm pack:python` before `pnpm dist`.
#
# Key paths:
#   resources/python/      - Bundled CPython 3.12 (from python-build-standalone)
#   resources/python-venv/ - Virtual environment with installed dependencies
#   resources/backend/     - XReadAgent Python source (xreadagent package)
#   frontend/dist/          - Pre-built frontend static assets

appId: com.xreadagent.desktop
productName: XReadAgent
copyright: Copyright (c) 2025 XReadAgent contributors (AGPL-3.0-or-later)

directories:
  output: release
  buildResources: build

# Only include the compiled dist/ output.
# esbuild bundles all source into dist/main.js and dist/preload.js,
# so node_modules is not needed in production (no production dependencies).
files:
  - dist/**/*
  - "!dist/tsconfig.tsbuildinfo"

# Extra resources are unpacked alongside the app (not inside asar).
# These are large directories that should not be inside the asar archive.
extraResources:
  # Bundled Python interpreter (from python-build-standalone).
  # Only present after running `pnpm pack:python`.
  - from: resources/python
    to: python
    filter:
      - "**/*"
  # Python virtual environment with xreadagent dependencies installed.
  - from: resources/python-venv
    to: python-venv
    filter:
      - "**/*"
  # XReadAgent Python backend source.
  - from: resources/backend
    to: backend
    filter:
      - "**/*"
  # Pre-built frontend static assets served by the Python sidecar.
  - from: ../frontend/dist
    to: frontend
    filter:
      - "**/*"

# Protocol handler for xread:// deep links.
protocols:
  - name: XReadAgent
    schemes:
      - xread

# File association for .xread workspace marker files.
fileAssociations:
  - ext: xread
    name: XReadAgent Workspace
    description: XReadAgent workspace marker file
    role: Editor

# asar packing for the Electron app itself.
# Python and backend are in extraResources (not inside asar).
asar: true
asarUnpack:
  - "dist/**/*.node"

# Windows-specific configuration.
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

# NSIS installer configuration.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: XReadAgent
  artifactName: "${productName}-Setup-${version}.${ext}"
  # Default installer language: English (1033).
  # Simplified Chinese (2052) is supported — users can switch in the installer UI.
  # Multi-language NSIS requires electron-builder >= 25 with language packs.
  language: 1033

# macOS configuration.
# Produces a universal binary (arm64 + x64 combined) by default.
# To build for a single arch only, set the env var:
#   BUILD_ARCH=arm64 pnpm dist:mac
# or override on the command line with electron-builder --mac --arm64.
mac:
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # When Apple Developer certificates are not available (CSC_LINK env var unset),
  # electron-builder will create an unsigned build. This allows developers to
  # test the macOS build without a certificate — the app will show a Gatekeeper
  # warning when launched. Set identity to null explicitly to skip signing.
  # For signed builds, set CSC_LINK and CSC_KEY_PASSWORD as env vars.
  extendInfo:
    CFBundleURLTypes:
      - CFBundleURLSchemes:
          - xread
        CFBundleURLName: com.xreadagent.desktop
    # Register .xread file type in Info.plist for macOS.
    CFBundleDocumentTypes:
      - CFBundleTypeName: XReadAgent Workspace
        CFBundleTypeRole: Editor
        LSItemContentTypes:
          - com.xreadagent.workspace
        CFBundleTypeExtensions:
          - xread

# DMG configuration for macOS disk image installer.
dmg:
  contents:
    - x: 130
      "y": 220
      type: file
      path: XReadAgent.app
    - x: 410
      "y": 220
      type: link
      path: /Applications

# Linux configuration (reserved for future v2).
linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Office