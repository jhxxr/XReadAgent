appId: com.xreadagent.desktop
productName: XReadAgent
copyright: Copyright (c) 2025 XReadAgent contributors (AGPL-3.0-or-later)

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - "!dist/tsconfig.tsbuildinfo"

extraResources:
  - from: resources/python
    to: python
    filter:
      - "**/*"
  - from: ../frontend/dist
    to: frontend
    filter:
      - "**/*"

# Protocol handler for xread:// deep links.
protocols:
  - name: XReadAgent
    schemes:
      - xread

# File association for .xread workspace files.
fileAssociations:
  - ext: xread
    name: XReadAgent Workspace
    description: XReadAgent workspace marker file
    role: Editor

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: XReadAgent
  artifactName: "${productName}-Setup-${version}.${ext}"

asar: true
